<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300&display=swap" rel="stylesheet">
  <style>

    body {
      font-family: 'Roboto Mono', monospace;
      letter-spacing: 5px;
    }

    #container {
      display: flex;
      width: 50%;
      margin: auto;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    #container h1 {
      border: 1px solid black;
      padding: 50px;
      margin: 20px;
      cursor: pointer;
    }

    #container h1:hover {
      background-color: blue;
      color: white;
      transition: background-color 0.5s ease-in-out;
    }

    #container p {
      text-align: left;
      margin: 20px;
      margin-top: 50px;
    }

  </style>
  <title>txt-fx Example</title>
  <script type="importmap">
  {
    "imports": {
      "txt-fx": "https://unpkg.com/txt-fx@1.0.1/index.js",
      "txt-fx/": "https://unpkg.com/txt-fx@1.0.1/"
    }
  }
  </script>
</head>

<body>
  <div id="container">
    <div>
      <p>Scramble</p>
      <h1 id="scramble">HELLO WORLD</h1>
    </div>
    <div>
      <p>Shuffle</p>
      <h1 id="shuffle">HELLO WORLD</h1>
    </div>
    <div>
      <p>Censor</p>
      <h1 id="censor">HELLO WORLD</h1>
    </div>
    <div>
      <p>Reverse Censor</p>
      <h1 id="reverse-censor">HELLO WORLD</h1>
    </div>
    <div>
      <p>Glitch</p>
      <h1 id="glitch">HELLO WORLD</h1>
    </div>
    <div>
      <p>Slow Reveal</p>
      <h1 id="slow-reveal">HELLO WORLD</h1>
    </div>
  </div>
  <script type="module" src="./main.js">
  </script>
</body>

</html>
